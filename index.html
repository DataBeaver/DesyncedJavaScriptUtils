<style>
body { background-color: #111827; color: white; font-family: sans-serif; margin: 0 }

table { border-collapse: collapse; margin:auto }

td { background-color: #1f2937 }

a:hover { color: #f26c43 }

<body>
<h1>Desynced JavaScript Utilities</h1>
<p>JavaScript utilities that can interact/interoperate with Desynced. Check out the <a href="https://github.com/StageGames/DesyncedJavaScriptUtils/">source on GitHub</a>!</p>

<h2>Desynced Decoder & Encoder</h2>
<table style="margin-bottom:10pt">
<tr><th style="padding:6pt">Input String</th></tr>
<tr><td style="padding:6pt"><textarea type="text" id="inp" rows=5 cols=120></textarea></td></tr>
<tr><th style="padding:6pt">Convert to or from JSON</th></tr>
<tr><td style="padding:6pt"><button style="width:100%;height:4em" onclick="run();">Convert to or from JSON</button></td></tr>
<tr><th style="padding:6pt">Output</th></tr>
<tr><td style="padding:6pt">Type:<br><input id="typ" style="width:100%"/><br>Result</br><textarea type="text" id="outp" rows=24 cols=120 readonly></textarea></td></tr>
<tr><th style="padding:6pt">Search</th></tr>
<tr><td style="padding:6pt">Subroutine:<br><input id="search" style="width:100%"/>
<tr><td style="padding:6pt"><button style="width:100%;height:4em" onclick="search();">Search</button></td></tr>
<tr><th style="padding:6pt">Results</th></tr>
<tr><td style="padding:6pt"><textarea type="text" id="srchres" rows=24 cols=120 readonly></textarea></tr>
</table>

<script src="dsconvert.js" type="text/javascript"></script>
<script type="text/javascript">
let jsonobj = null;
function run()
{
	var str = document.getElementById('inp').value;
	jsonobj = null;
	try { jsonobj = JSON.parse(str); } catch { }
	try
	{
		if (!jsonobj)
		{
			var info = {};
			jsonobj = DesyncedStringToObject(str, info);
			document.getElementById('outp').value = JSON.stringify(jsonobj, null, 4);
			document.getElementById('typ').value = info.type + " (" + (info.type == "B" ? "BLUEPRINT" : (info.type == "C" ? "BEHAVIOR" : (info.type == "R" ? "REGISTER" : "UNKNOWN"))) + ")";
		}
		else
		{
			var type = (document.getElementById('typ').value[0] || (jsonobj[0] ? 'C' : 'B')); // simple guess
			document.getElementById('outp').value = ObjectToDesyncedString(jsonobj, type);
			document.getElementById('typ').value = type + " (" + (type == "B" ? "BLUEPRINT" : (type == "C" ? "BEHAVIOR" : (type == "R" ? "REGISTER" : "UNKNOWN"))) + ")";
		}
	}
	catch (e)
	{
		document.getElementById('outp').value = "ERROR: " + e.message;
		document.getElementById('typ').value = "";
	}

	document.getElementById('srchres').value = "";
}

function search()
{
	if (!jsonobj)
		return;

	let str = document.getElementById('search').value.toLowerCase();
	if(!str)
		return;

	let words = str.split(' ');

	let subs = [];
	for (let i = 0; i < jsonobj.dependencies.length; ++i)
	{
		let name = jsonobj.dependencies[i].name.toLowerCase();
		if (name == str)
		{
			subs = [i];
			break;
		}
		else
		{
			let allFound = true;
			for (let w of words)
				if (name.indexOf(w) < 0)
					allFound = false;

			if (allFound)
				subs.push(i);
		}
	}

	let result = "";
	for (let s of subs)
	{
		if (result)
			result += "\n";
		result += "Subroutine: " + jsonobj.dependencies[s].name + "\n";
		if (search_sub(jsonobj, s))
			result += "Used in " + jsonobj.name + "\n";
		if (jsonobj.dependencies)
		{
			for (let d of jsonobj.dependencies)
				if (search_sub(d, s))
					result += "Used in " + d.name + "\n";
		}
	}

	document.getElementById('srchres').value = result;
}

function search_sub(behaviour, sub)
{
	for (let key in behaviour)
	{
		inst = behaviour[key];
		if (inst.op === "call" && inst.sub == sub + 1)
			return true;
	}

	return false;
}
</script>
